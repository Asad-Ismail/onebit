name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Apple Silicon runner — MLX requires it.
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check onebit

      - name: Test
        run: pytest -q
